apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatusalerts.monitoring.gatus.io
spec:
  group: monitoring.gatus.io
  names:
    kind: GatusAlert
    listKind: GatusAlertList
    plural: gatusalerts
    singular: gatusalert
    shortNames:
      - ga
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  description: Alert provider type. Must be one of the supported Gatus providers.
                  enum:
                    - awsses
                    - clickup
                    - custom
                    - datadog
                    - discord
                    - email
                    - gitea
                    - github
                    - gitlab
                    - googlechat
                    - gotify
                    - homeassistant
                    - ifttt
                    - ilert
                    - incident-io
                    - line
                    - matrix
                    - mattermost
                    - messagebird
                    - n8n
                    - newrelic
                    - ntfy
                    - opsgenie
                    - pagerduty
                    - plivo
                    - pushover
                    - rocketchat
                    - sendgrid
                    - signal
                    - signl4
                    - slack
                    - splunk
                    - squadcast
                    - teams
                    - teams-workflows
                    - telegram
                    - twilio
                    - vonage
                    - webex
                    - zapier
                    - zulip
                enabled:
                  type: boolean
                  default: true
                  description: Whether this alert is globally enabled.
                webhookUrl:
                  type: string
                  description: Webhook URL for providers that support it.
                failureThreshold:
                  type: integer
                  default: 3
                  description: Default consecutive failures before triggering the alert.
                successThreshold:
                  type: integer
                  default: 2
                  description: Default consecutive successes before resolving an incident.
                sendOnResolved:
                  type: boolean
                  description: Whether to send a notification when the alert resolves.
                description:
                  type: string
                  description: Default description included in the alert notification.
                minimumReminderInterval:
                  type: string
                  description: Minimum duration between alert reminders (e.g. "30m"). Empty disables reminders.
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
