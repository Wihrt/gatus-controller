apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatusendpoints.monitoring.gatus.io
spec:
  group: monitoring.gatus.io
  names:
    kind: GatusEndpoint
    listKind: GatusEndpointList
    plural: gatusendpoints
    singular: gatusendpoint
    shortNames:
      - ge
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["name", "url"]
              properties:
                name:
                  type: string
                group:
                  type: string
                url:
                  type: string
                conditions:
                  type: array
                  items:
                    type: string
                alerts:
                  type: array
                  items:
                    type: object
                    required: ["name"]
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                dns:
                  type: object
                  required: ["queryName"]
                  properties:
                    queryName:
                      type: string
                    queryType:
                      type: string
                      default: A
                ui:
                  type: object
                  properties:
                    hideHostname:
                      type: boolean
                    hideUrl:
                      type: boolean
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
      subresources:
        status: {}
